<section class="page" *ngIf="state.snapshot as snapshot">
  <ng-container *ngIf="vm; else emptyState">
    <app-decision-summary-panel [dashboard]="vm" [currencyScope]="currencyScope"></app-decision-summary-panel>

    <app-decision-liquidity-panel
      [liquidity]="vm.liquidityCards"
      [privacyEnabled]="privacyMode.enabled">
    </app-decision-liquidity-panel>

    <app-decision-movements-panel
      [movements]="vm.movements"
      [movementDateRange]="movementDateRange"
      [movementPresets]="movementPresets"
      [privacyEnabled]="privacyMode.enabled"
      (movementDateRangeChange)="movementDateRange = $event; persistMovementRange(); refreshVm()"
      (presetSelected)="setMovementPreset($event)">
    </app-decision-movements-panel>

    <app-decision-minimum-benchmark-review
      [review]="vm.minimumBenchmarkReview"
      [privacyEnabled]="privacyMode.enabled">
    </app-decision-minimum-benchmark-review>

    <app-decision-activated-alerts
      [activatedAlerts]="vm.activatedAlerts"
      [privacyEnabled]="privacyMode.enabled">
    </app-decision-activated-alerts>

    <app-decision-simulator-panel
      [simulation]="vm.simulation"
      [simulationCurrency]="simulationCurrency"
      [monthlyContribution]="monthlyContribution"
      [months]="months"
      [annualReturnPercent]="annualReturnPercent"
      [simulationRateMode]="simulationRateMode"
      [performanceReferences]="vm.performance"
      [privacyEnabled]="privacyMode.enabled"
      (simulationCurrencyChange)="simulationCurrency = $event; onControlsChange()"
      (monthlyContributionChange)="monthlyContribution = $event; onControlsChange()"
      (monthsChange)="months = $event; onControlsChange()"
      (annualReturnPercentChange)="annualReturnPercent = $event; onControlsChange()"
      (simulationRateModeChange)="simulationRateMode = $event; onControlsChange()">
    </app-decision-simulator-panel>

    <app-decision-performance-panel
      [performance]="vm.performance"
      [privacyEnabled]="privacyMode.enabled">
    </app-decision-performance-panel>

    <app-decision-export-panel
      [exportMode]="exportMode"
      [exportFormat]="exportFormat"
      [includeFullPurchases]="includeFullPurchases"
      [includeMonthlyHistory]="includeMonthlyHistory"
      [includeSignals]="includeSignals"
      [includeDataReview]="includeDataReview"
      [includeSimulation]="includeSimulation"
      [maskSensitiveExports]="maskSensitiveExports"
      [privacyEnabled]="privacyMode.enabled"
      [weeklyContext]="weeklyContext"
      [rangeLabel]="vm.movements.rangeLabel"
      [rangePresetLabel]="vm.movements.rangePresetLabel"
      (exportModeChange)="exportMode = $event; onControlsChange()"
      (exportFormatChange)="exportFormat = $event; onControlsChange()"
      (includeFullPurchasesChange)="includeFullPurchases = $event; onControlsChange()"
      (includeMonthlyHistoryChange)="includeMonthlyHistory = $event; onControlsChange()"
      (includeSignalsChange)="includeSignals = $event; onControlsChange()"
      (includeDataReviewChange)="includeDataReview = $event; onControlsChange()"
      (includeSimulationChange)="includeSimulation = $event; onControlsChange()"
      (maskSensitiveExportsChange)="maskSensitiveExports = $event; onControlsChange()"
      (cashArsChange)="weeklyContext.cashArs = $event; persistWeeklyContext(); onControlsChange()"
      (cashUsdChange)="weeklyContext.cashUsd = $event; persistWeeklyContext(); onControlsChange()"
      (clearCash)="clearWeeklyContext(); onControlsChange()"
      (copyExport)="copySummary(snapshot)"
      (downloadExport)="exportContext(snapshot)">
    </app-decision-export-panel>

    <app-decision-signals-summary [signalsSummary]="vm.signalSummary"></app-decision-signals-summary>
  </ng-container>

  <ng-template #emptyState>
    <article class="panel">
      <h3>No hay datos para decisiones</h3>
      <p>Importa el Excel para habilitar el semáforo, las acciones sugeridas y el simulador.</p>
    </article>
  </ng-template>
</section>
